name: Dev Verify

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: gradle:8.14.5-jdk21@sha256:a8741ddd2055e9948af8082598ef7b44e6077be246f03a79d42204ffdd6153b1
    env:
      GITEA_TOKEN: ${{ github.token }}
      GITEA_API_URL: ${{ github.server_url }}/api/v1
      GITEA_REPO: ${{ github.repository }}
      GITEA_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
    steps:
      - name: Prepare source
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f build.gradle ]; then
            git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" \
              clone --depth 1 "${GITEA_REPO_URL}" .
          fi

      - name: Verify
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon compileClientJava
