name: Dev Verify

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: gradle:9.6.0-jdk21@sha256:6b71d4d40e45200709c178ca0ab10125e1d99e6e44dec6bcbabd0a3371f8e650
    env:
      GITEA_TOKEN: ${{ github.token }}
      GITEA_API_URL: ${{ github.server_url }}/api/v1
      GITEA_REPO: ${{ github.repository }}
      GITEA_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
    steps:
      - name: Prepare source
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f build.gradle ]; then
            git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" \
              clone --depth 1 "${GITEA_REPO_URL}" .
          fi

      - name: Verify
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon compileClientJava
