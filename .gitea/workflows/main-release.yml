name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: gradle:9.6.1-jdk21@sha256:b301b2336816c00c1e7c86dbe60f65317797bb9e97de2d46c86915d814f578a6
    env:
      GITEA_TOKEN: ${{ github.token }}
      GITEA_API_URL: ${{ github.server_url }}/api/v1
      GITEA_REPO: ${{ github.repository }}
      GITEA_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      GITEA_REF_NAME: ${{ github.ref_name }}
      GITEA_SHA: ${{ github.sha }}
    steps:
      - name: Prepare source
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f build.gradle ]; then
            git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" \
              clone --depth 1 "${GITEA_REPO_URL}" .
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          minecraft_version="$(sed -n 's/^minecraft_version=//p' gradle.properties | head -n 1)"
          yarn_mappings="$(sed -n 's/^yarn_mappings=//p' gradle.properties | head -n 1)"
          fabric_version="$(sed -n 's/^fabric_version=//p' gradle.properties | head -n 1)"

          echo "Building Minecraft ${minecraft_version}"
          echo "Using Yarn mappings ${yarn_mappings}"
          echo "Using Fabric API ${fabric_version}"

          gradle --no-daemon clean build

          mkdir -p release-artifacts

          jar_path=""
          shopt -s nullglob
          for candidate in build/libs/*.jar; do
            case "$(basename "${candidate}")" in
              *-sources.jar|*-dev.jar)
                continue
                ;;
            esac

            jar_path="${candidate}"
            break
          done

          if [ -z "${jar_path}" ]; then
            echo "No build jar found for Minecraft ${minecraft_version}"
            exit 1
          fi

          cp "${jar_path}" "release-artifacts/sign-leak-shield-${minecraft_version}.jar"

      - name: Publish Gitea release
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          jar_paths=(release-artifacts/*.jar)
          if [ "${#jar_paths[@]}" -eq 0 ]; then
            echo "No build artifacts were produced"
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITEA_REF_NAME}"
            release_name="${GITEA_REF_NAME}"
            prerelease=false
          else
            release_tag="build-${GITEA_SHA:0:7}"
            release_name="build-${GITEA_SHA:0:7}"
            prerelease=false
          fi

          release_payload="$(printf '{"tag_name":"%s","name":"%s","body":"Automated build for the pinned Minecraft target in gradle.properties.","draft":false,"prerelease":%s}' \
            "${release_tag}" "${release_name}" "${prerelease}")"

          release_response_file="$(mktemp)"
          release_status="$(
            curl -sS -o "${release_response_file}" -w '%{http_code}' \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${release_payload}" \
              "${GITEA_API_URL}/repos/${GITEA_REPO}/releases"
          )"

          case "${release_status}" in
            201)
              release_json="$(cat "${release_response_file}")"
              ;;
            409)
              release_json="$(
                curl -fsS \
                  -H "Authorization: token ${GITEA_TOKEN}" \
                  "${GITEA_API_URL}/repos/${GITEA_REPO}/releases/tags/${release_tag}"
              )"
              ;;
            *)
              echo "Failed to create release. HTTP ${release_status}"
              cat "${release_response_file}"
              rm -f "${release_response_file}"
              exit 1
              ;;
          esac
          rm -f "${release_response_file}"

          release_id="$(printf '%s' "${release_json}" | sed -n 's/.*"id":[[:space:]]*\([0-9][0-9]*\).*/\1/p' | head -n 1)"
          if [ -z "${release_id}" ]; then
            echo "Failed to parse release ID from response:"
            printf '%s\n' "${release_json}"
            exit 1
          fi

          for jar_path in "${jar_paths[@]}"; do
            curl -fsS \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: multipart/form-data" \
              -F "attachment=@${jar_path}" \
              "${GITEA_API_URL}/repos/${GITEA_REPO}/releases/${release_id}/assets?name=$(basename "${jar_path}")"
          done
